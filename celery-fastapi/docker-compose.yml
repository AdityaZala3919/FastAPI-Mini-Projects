version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: celery_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: always
    networks:
      - celery_network

  celery_worker:
    image: python:3.11-slim
    container_name: celery_worker
    working_dir: /app
    command: >
      sh -c "pip install -q celery redis python-dotenv &&
             sleep 3 &&
             celery -A celery_app worker --loglevel=info"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - celery_network
    volumes:
      - .:/app

volumes:
  redis_data:

networks:
  celery_network:
    driver: bridge
